# 飞牛 NAS 部署专用 — 直接用 GHCR 预构建镜像, 不需要源码
# 用法:
#   1. 把此文件放到 NAS 上 (例如 /vol1/1000/docker/family-library/docker-compose.yml)
#   2. mkdir -p data/uploads && chmod 777 data/uploads
#   3. docker compose up -d
#   4. 浏览器打开 http://<NAS-IP>:8180
#
# 首次启动会自动 seed 演示数据 (管理员: admin / admin123)
#
# 升级: docker compose pull && docker compose up -d

services:
  # ===== 后端 FastAPI + SQLite =====
  backend:
    image: ghcr.io/vipuncle2026/family-library-backend:main
    container_name: family-library-backend
    restart: unless-stopped
    expose:
      - "8000"               # 不对外暴露, 只让 nginx 反代访问
    volumes:
      # ★ 关键: SQLite db + 用户上传的封面都要持久化到 NAS 本地盘
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/api/books?limit=1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===== 前端 Vue 静态 + nginx 反代 =====
  frontend:
    image: ghcr.io/vipuncle2026/family-library-frontend:main
    container_name: family-library-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8180:80"            # 改成 80:80 可以直接用 NAS IP 访问
    environment:
      - TZ=Asia/Shanghai
