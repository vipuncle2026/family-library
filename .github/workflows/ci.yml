name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ===== 后端: 装依赖 + 导入检查 + 路由自检 =====
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check (无运行, 只验证 import 不挂)
        working-directory: backend
        run: |
          python -m compileall -q app scripts
          # 尝试导入所有模块 (不会启动服务)
          python -c "
          import sys
          sys.path.insert(0, '.')
          from app.core import database, config, security
          from app.models import user, book, household, reading_record, meta_cache
          from app.schemas import schemas
          from app.services import douban
          from app.api import auth, books, household, members, records, stats, meta_cache, covers
          print('all modules import ok')
          "

  # ===== 前端: 装依赖 + build =====
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
