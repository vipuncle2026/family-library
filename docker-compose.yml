# 飞牛 NAS / 家用 Linux NAS 部署
# 用法:
#   1. 把整个 family-library 目录上传到 NAS (例如 /vol1/1000/docker/family-library)
#   2. cd /vol1/1000/docker/family-library
#   3. docker compose up -d --build
#   4. 浏览器打开 http://<NAS-IP>:8180
#
# 首次启动会自动 seed 演示数据 (管理员: admin / admin123)

services:
  # ===== 后端 FastAPI + SQLite =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: family-library-backend
    restart: unless-stopped
    expose:
      - "8000"               # 不对外暴露, 只让 nginx 反代访问
    volumes:
      # ★ 关键: SQLite db + 用户上传的封面都要持久化到 NAS 本地盘
      # 默认会写到 /vol1/1000/docker/family-library/data/
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/api/books?limit=1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===== 前端 Vue 静态 + nginx 反代 =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: family-library-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8180:80"            # 改成 80:80 可以直接用 NAS IP 访问
    environment:
      # 不需要, nginx.conf 直接用容器名 backend
      - TZ=Asia/Shanghai
